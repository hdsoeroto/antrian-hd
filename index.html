<!DOCTYPE html>
<html lang="id">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Antrian Hemodialisis</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

body{
background:linear-gradient(
135deg,
#0d6efd,
#6ea8fe
);
min-height:100vh;
display:flex;
align-items:center;
justify-content:center;
padding:20px;
}

.card-custom{
max-width:650px;
width:100%;
border:none;
border-radius:25px;
overflow:hidden;
box-shadow:0 10px 30px rgba(0,0,0,.2);
}

.header{
background:white;
padding:30px;
text-align:center;
}

.logo{
font-size:60px;
}

.result{
display:none;
}

.big-number{
font-size:70px;
font-weight:bold;
color:#0d6efd;
}

.status{
font-size:20px;
font-weight:bold;
}

</style>

</head>

<body>

<div class="card card-custom">

<div class="header">

<div class="logo">
🏥
</div>

<h2>
Sistem Antrian Hemodialisis
</h2>

<p>
Cek posisi antrean Anda secara realtime
</p>

</div>

<div class="card-body p-4">

<label class="form-label">

Nomor NIK

</label>

<input
type="text"
id="nik"
class="form-control form-control-lg"
placeholder="Masukkan NIK">

<button
class="btn btn-primary btn-lg w-100 mt-3"
onclick="cekAntrian()">

Cek Antrean

</button>

<div
id="loading"
class="text-center mt-3"
style="display:none">

Memproses...

</div>

<div
id="hasil"
class="result mt-4">

<hr>

<h4
id="nama"
class="text-center">
</h4>

<div class="text-center">

<div
class="big-number"
id="posisi">
</div>

<div>
Posisi Antrean
</div>

</div>

<div class="row mt-4">

<div class="col-6 text-center">

<h5>
Pasien di Depan Anda
</h5>

<h2 id="sisa">
</h2>

</div>

<div class="col-6 text-center">

<h5>
Status
</h5>

<div
id="status"
class="status">
</div>

</div>

</div>

</div>

</div>

</div>

<script>

async function cekAntrian(){

const nik =
document.getElementById("nik").value;

if(nik==""){

alert("Masukkan NIK");

return;

}

document
.getElementById("loading")
.style.display="block";

const api =
"https://script.google.com/macros/s/AKfycbx0SuQC-Ad-BOYFKRoeL9u5GDpqbS_EpxhHwBeQArSmml_r1fEHz-v1_1l8_MrNRWnN/exec?nik="
+ encodeURIComponent(nik);

try{

const res =
await fetch(api);

const data =
await res.json();

document
.getElementById("loading")
.style.display="none";

if(data.ditemukan){

document
.getElementById("hasil")
.style.display="block";

document
.getElementById("nama")
.innerText =
data.nama;

document
.getElementById("posisi")
.innerText =
data.posisi;

document
.getElementById("sisa")
.innerText =
data.sisa;

document
.getElementById("status")
.innerText =
data.status;

}else{

alert(
"Data pasien tidak ditemukan"
);

}

}catch(err){

alert(
"Gagal terhubung ke server"
);

}

}

</script>

</body>
</html>
